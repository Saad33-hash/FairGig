name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  # ── Job 1: Build frontend on CI runner and upload artifact ───────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Client dependencies
        working-directory: Client
        run: npm install

      - name: Build Client
        working-directory: Client
        run: npm run build
        env:
          VITE_API_BASE_URL: https://vircosa.com/api

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: Client/dist/
          retention-days: 1

  # ── Job 2: Deploy to Oracle Cloud (only after build passes) ──────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: Client/dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy frontend build to server
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.SSH_HOST }} "sudo rm -rf /var/www/html/faircig && sudo mkdir -p /var/www/html/faircig && sudo chown ubuntu:ubuntu /var/www/html/faircig"
          scp -i ~/.ssh/deploy_key -r Client/dist/. ubuntu@${{ secrets.SSH_HOST }}:/var/www/html/faircig/

      - name: Deploy backend to server
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -e

            echo "──────────────────────────────────────"
            echo "  FairGig Deploy — $(date)"
            echo "──────────────────────────────────────"

            cd /var/www/FairGig

            # ── Pull latest code ──────────────────────────────────────────
            echo "[1/4] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # ── Server dependencies ───────────────────────────────────────
            echo "[2/4] Installing server dependencies..."
            cd /var/www/FairGig/Server
            npm install --omit=dev

            # ── Python services ───────────────────────────────────────────
            echo "[3/4] Updating Python dependencies..."
            cd /var/www/FairGig/anomaly-service
            pip install -r requirements.txt -q

            cd /var/www/FairGig/analytics-service
            pip install -r requirements.txt -q

            # ── Reload nginx + restart Node server ────────────────────────
            echo "[4/4] Reloading services..."
            sudo systemctl reload nginx

            cd /var/www/FairGig/Server
            pm2 restart fairgig
            pm2 restart analytics-service
            pm2 restart anomaly-service
            pm2 save

            echo "──────────────────────────────────────"
            echo "  Deploy complete!"
            echo "──────────────────────────────────────"
            pm2 status
          ENDSSH

      - name: Health check
        run: |
          echo "Waiting for server to come up..."
          sleep 8
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://vircosa.com/api/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check FAILED — server returned $STATUS"
            exit 1
          fi
          echo "Health check passed!"

      - name: Notify success
        if: success()
        run: echo "Deployment to vircosa.com succeeded."

      - name: Notify failure
        if: failure()
        run: echo "Deployment FAILED. Check logs above."
